<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>1:1 高速連続撮影 & R2送信</title>
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1438.0.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; margin: 0; padding: 10px; background: #EFEFEF; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 15px; border-radius: 16px; }
        
        /* 1:1の正方形カメラビュー */
        .camera-wrapper {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            margin-bottom: 15px;
        }
        #camera-stream {
            width: 100%;
            height: 100%;
            object-fit: cover; /* はみ出した部分を隠して1:1にする */
        }
        
        /* シャッターボタン */
        .shutter-btn {
            width: 80px; height: 80px; border-radius: 50%;
            background: #FF90E8; border: 4px solid #fff; outline: 4px solid #111;
            cursor: pointer; margin: 10px auto; transition: 0.1s;
        }
        .shutter-btn:active { transform: scale(0.9); background: #d53f8c; }
        
        /* 撮影した画像のプレビューエリア */
        .preview-list {
            display: flex; gap: 8px; overflow-x: auto; padding: 10px 0;
        }
        .preview-item {
            position: relative; flex-shrink: 0;
        }
        .preview-img {
            width: 70px; height: 70px; object-fit: cover; border-radius: 8px; border: 1px solid #ddd;
        }
        .delete-btn {
            position: absolute; top: -5px; right: -5px; background: red; color: white;
            border-radius: 50%; width: 20px; height: 20px; font-size: 12px; border: none; cursor: pointer;
        }

        .submit-btn {
            width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; background: #111; color: #fff; cursor: pointer;
        }
        .submit-btn:disabled { background: #ccc; }
        #status { margin-top: 15px; font-size: 14px; color: #d32f2f; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <input type="text" id="management-code" placeholder="管理番号 (例: OM10001HG)" style="width:100%; padding:12px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box; margin-bottom:15px; font-size:16px;">
    
    <div class="camera-wrapper">
        <video id="camera-stream" autoplay playsinline></video>
    </div>

    <div class="shutter-btn" onclick="takePhoto()"></div>
    <div style="font-size: 12px; color: #666; margin-bottom: 15px;">シャッターを押して連続撮影 (最大20枚)</div>

    <div class="preview-list" id="preview-list"></div>
    <canvas id="capture-canvas" style="display:none;" width="800" height="800"></canvas>

    <button id="upload-btn" class="submit-btn" onclick="uploadAllImages()">R2へ一括送信</button>
    <div id="status"></div>
</div>

<script>
  // ▼▼▼ ステップ1で取得したCloudflare R2の情報を入力してください ▼▼▼
    const R2_ACCOUNT_ID = 'a73ad889c944b152ede6d3329c545f8c';
    const R2_ACCESS_KEY = '92d4bcff0e4c138bdbcb0d4def85d114';
    const R2_SECRET_KEY = 'c0710a593132682ac557ab21b0c973974c0956ab49cb8d28a57aa67b7bc7c395';
    const BUCKET_NAME = 'mercari-images'; // 作成したバケット名
    const PUBLIC_URL = 'https://pub-8e4386156d26427f861486afe0381fb4.r2.dev'; // 許可したR2.devサブ 

    AWS.config.update({
        accessKeyId: R2_ACCESS_KEY,
        secretAccessKey: R2_SECRET_KEY,
        region: 'auto',
        endpoint: new AWS.Endpoint(`https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com`)
    });
    const s3 = new AWS.S3({ signatureVersion: 'v4' });

    // カメラの起動処理
    const video = document.getElementById('camera-stream');
    let capturedBlobs = []; // 撮影した画像を溜める配列

    async function startCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: 'environment' } // 背面カメラを指定
            });
            video.srcObject = stream;
        } catch (err) {
            document.getElementById('status').innerText = "カメラの起動に失敗しました。ブラウザのカメラ許可を確認してください。";
        }
    }
    startCamera(); // ページを開いたら即カメラ起動

    // 撮影ボタンを押した時の処理
    function takePhoto() {
        if (capturedBlobs.length >= 20) {
            alert("最大20枚までです"); return;
        }

        const canvas = document.getElementById('capture-canvas');
        const ctx = canvas.getContext('2d');
        
        // ビデオの映像の「中央の正方形」を計算して切り抜く
        const size = Math.min(video.videoWidth, video.videoHeight);
        const startX = (video.videoWidth - size) / 2;
        const startY = (video.videoHeight - size) / 2;

        // キャンバス(800x800)に1:1で描画
        ctx.drawImage(video, startX, startY, size, size, 0, 0, 800, 800);

        // JPEGに圧縮して保存
        canvas.toBlob((blob) => {
            capturedBlobs.push(blob);
            renderPreviews();
        }, 'image/jpeg', 0.6);
    }

    // プレビューの表示
    function renderPreviews() {
        const list = document.getElementById('preview-list');
        list.innerHTML = '';
        capturedBlobs.forEach((blob, index) => {
            const url = URL.createObjectURL(blob);
            list.innerHTML += `
                <div class="preview-item">
                    <img src="${url}" class="preview-img">
                    <button class="delete-btn" onclick="deletePhoto(${index})">×</button>
                </div>
            `;
        });
    }

    // 写真の削除
    function deletePhoto(index) {
        capturedBlobs.splice(index, 1);
        renderPreviews();
    }

    // 全画像のアップロード処理
    async function uploadAllImages() {
        const code = document.getElementById('management-code').value.trim();
        if (!code) { alert("管理番号を入力してください"); return; }
        if (capturedBlobs.length === 0) { alert("写真を撮影してください"); return; }

        const uploadBtn = document.getElementById('upload-btn');
        const status = document.getElementById('status');
        uploadBtn.disabled = true;
        status.innerText = "送信中... (0 / " + capturedBlobs.length + ")";

        let successCount = 0;

        for (let i = 0; i < capturedBlobs.length; i++) {
            const fileName = `${code}-${i + 1}.jpg`;
            const params = {
                Bucket: BUCKET_NAME,
                Key: fileName,
                Body: capturedBlobs[i],
                ContentType: 'image/jpeg'
            };

            try {
                await s3.putObject(params).promise();
                successCount++;
                status.innerText = `送信中... (${successCount} / ${capturedBlobs.length})`;
            } catch (err) {
                alert(fileName + "の送信に失敗しました: " + err.message);
            }
        }

        status.innerText = "全画像の送信が完了しました！";
        uploadBtn.disabled = false;
        capturedBlobs = []; // 送信完了後にリセット
        renderPreviews();
    }
</script>

</body>
</html>
